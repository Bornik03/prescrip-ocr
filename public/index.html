<!doctype html>
<html>
<head>
  <title>OCR Cropper</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f9;
      padding: 20px;
    }

    #img-container {
      max-width: 500px;
      margin: auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    #preview {
      max-width: 100%;
      display: block;
    }

    /* 🔥 Thick Crop Box */
    .cropper-view-box {
      outline: 3px solid #00ffcc !important;
    }

    .cropper-line {
      background-color: #00ffcc !important;
    }

    .cropper-point {
      width: 12px !important;
      height: 12px !important;
      background: #00ffcc !important;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Upload and Crop Image</h2>

<input type="file" id="fileInput">

<div id="img-container">
  <img id="preview">
</div>

<button id="cropBtn" style="display:none;">Crop & Extract</button>

<pre id="result"></pre>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
let cropper;

fileInput.onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    preview.src = reader.result;

    if (cropper) cropper.destroy();

    cropper = new Cropper(preview, {
      viewMode: 2,
      autoCropArea: 1,
      background: false
    });

    cropBtn.style.display = "inline-block";
  };

  reader.readAsDataURL(file);
};

cropBtn.onclick = () => {
  const canvas = cropper.getCroppedCanvas();

  canvas.toBlob(blob => {
    const formData = new FormData();
    formData.append("file", blob, "image.png");

    fetch("/api/ocr", {
      method: "POST",
      body: formData
    })
    .then(res => res.text())
    .then(text => {
      result.innerText = text;
    });
  });
};
</script>

</body>
</html>
